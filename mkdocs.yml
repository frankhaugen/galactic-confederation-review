site_name: Galactic Confederation Review
site_description: Selected scholarship from across the Galactic Confederation
site_url: https://frankhaugen.github.io/galactic-confederation-review/

repo_url: https://github.com/frankhaugen/galactic-confederation-review
repo_name: Galactic Confederation Review

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.footnote.tooltips
  palette:
    - scheme: default
      primary: blue grey
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: blue grey
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono

markdown_extensions:
  - admonition
  - footnotes
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - def_list
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
      enable_git_follow: false
      type: date
  - minify:
      minify_html: true

extra_css:
  - assets/stylesheets/extra.css

nav:
  - Review Home: index.md
  - About the Review: about.md
  - Editorial Policy: editorial-policy.md
  - Contributing Authors: authors.md
  - Republished Articles:
      - Humanity's Second Abolition: articles/humanitys-second-abolition.md
      - Freight Insurance as Governance: articles/freight-insurance-as-governance.md
      - Infinite Brutality, Civilian Response: articles/infinite-brutality-civilian-response.md
      - Notes on Informal Shipboard Ritual: articles/notes-on-informal-shipboard-ritual.md
