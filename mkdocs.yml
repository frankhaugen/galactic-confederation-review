          - The Ship That Can Sign Its Own Shadow: articles/the-ship-that-can-sign-its-own-shadow.md
          - What Fits Inside the Standard: articles/what-fits-inside-the-standard.md
          - The Thinking Software Taboo: articles/the-thinking-software-taboo.md
