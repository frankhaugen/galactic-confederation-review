site_name: Galactic Confederation Review
site_description: Independent republication review of selected Confederation scholarship
site_url: https://frankhaugen.github.io/galactic-confederation-review/
copyright: Galactic Confederation Review Registry · Public archive edition · Review cycle 2496.229

theme:
  name: material
  custom_dir: overrides
  language: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.footnote.tooltips
  palette:
    - scheme: default
      primary: blue grey
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: blue grey
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono

markdown_extensions:
  - admonition
  - footnotes
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - def_list
  - meta
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search
  - tags
  - minify:
      minify_html: true

hooks:
  - hooks/audio_player.py

extra_css:
  - assets/stylesheets/extra.css

extra:
  generator: false
  review_cycle: "2496.229"
  archive_class: Public archive edition
  audio:
    caption: "Audio edition · narrated for accessibility"

nav:
  - Review Home: index.md
  - About the Review: about.md
  - Editorial Policy: editorial-policy.md
  - Editorial Content: editorial-content.md
  - Series:
      - series/index.md
      - Species Profiles: series/species-profiles.md
      - Historical Summaries: series/historical-summaries.md
      - Earth Union Studies: series/earth-union-studies.md
      - Comparative Law: series/comparative-law.md
      - Guardianship Debates: series/guardianship-debates.md
      - Standards and Infrastructure: series/standards-and-infrastructure.md
      - Communications and Transit: series/communications-and-transit.md
      - Fleet and Rescue Doctrine: series/fleet-and-rescue-doctrine.md
  - Dossiers:
      - dossiers/index.md
      - Earth Union Primer: dossiers/earth-union-primer.md
      - Guardianship Settlement: dossiers/guardianship-settlement.md
      - Compact and Confederation Origins: dossiers/compact-and-confederation-origins.md
      - Ansible and Communications: dossiers/ansible-and-communications.md
      - Ship Law and Registry: dossiers/ship-law-and-registry.md
  - Archive Register: articles/index.md
  - Classification Index: tags.md
  - Contributing Authors: authors.md
