site_name: Galactic Confederation Review
site_description: Independent republication review of selected Confederation scholarship
site_url: https://frankhaugen.github.io/galactic-confederation-review/
copyright: Galactic Confederation Review Registry · Public archive edition · Review cycle 2496.221

theme:
  name: material
  custom_dir: overrides
  language: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.footnote.tooltips
  palette:
    - scheme: default
      primary: blue grey
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: blue grey
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono

markdown_extensions:
  - admonition
  - footnotes
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - def_list
  - meta
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search
  - tags
  - minify:
      minify_html: true

extra_css:
  - assets/stylesheets/extra.css

extra:
  generator: false
  review_cycle: "2496.221"
  archive_class: Public archive edition

exclude_docs: |
  articles/freight-insurance-as-governance.md
  articles/humanitys-second-abolition.md
  articles/infinite-brutality-civilian-response.md
  articles/notes-on-informal-shipboard-ritual.md

nav:
  - Review Home: index.md
  - About the Review: about.md
  - Editorial Policy: editorial-policy.md
  - Archive Register: articles/index.md
  - Classification Index: tags.md
  - Contributing Authors: authors.md
  - Republished Articles:
      - Founding & Charter Law:
          - When Moral Alignment Failed at Interstellar Scale: articles/when-moral-alignment-failed-at-interstellar-scale.md
          - The Compromise That Named the Chain: articles/the-compromise-that-named-the-chain.md
          - The Chain Was Not Softened: articles/the-chain-was-not-softened.md
          - The Human Trap in the Guardianship Settlement: articles/the-human-trap-in-guardianship-settlement.md
          - What the Ledger Refuses to See: articles/what-the-ledger-refuses-to-see.md
          - Status Laundering at the Registry Interface: articles/status-laundering-at-the-registry-interface.md
      - Earth Union Institutions:
          - Why Earth Union Is Still Called Earth Union: articles/why-earth-union-is-still-called-earth-union.md
          - Children of Terra: articles/children-of-terra.md
          - Bells, Bread, and Field Hospitals: articles/bells-bread-and-field-hospitals.md
          - Infinite Brutality, Infinite Compassion: articles/infinite-brutality-infinite-compassion.md
      - Infrastructure & Commerce:
          - C-Series Containers and the Founding Standard: articles/c-series-containers-founding-standard.md
          - What Fits Inside the Standard: articles/what-fits-inside-the-standard.md
          - Faster-Than-Light Transit: articles/ftl-transit-operational-tradeoffs.md
          - The Confederation Does Not Deliver Messages: articles/the-confederation-does-not-deliver-messages.md
          - The Ansible Is Not a Radio: articles/ansible-is-not-a-radio.md
      - Law, Cognition & Enforcement:
          - Prize-Class Recovery and the Vigilantism Line: articles/prize-class-recovery-and-the-vigilantism-line.md
          - Capability Is Not Classification: articles/capability-is-not-classification.md
      - Comparative Policy & Xenology:
          - Institutions Without Parenthood: articles/institutions-without-parenthood.md
