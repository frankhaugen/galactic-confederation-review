site_name: Galactic Confederation Review
site_description: Independent republication review of selected Confederation scholarship
copyright: Galactic Confederation Review Registry 2496.212

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.footnote.tooltips
  palette:
    - scheme: default
      primary: blue grey
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: blue grey
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono

markdown_extensions:
  - admonition
  - footnotes
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - def_list
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search
  - minify:
      minify_html: true

extra_css:
  - assets/stylesheets/extra.css

extra:
  generator: false

nav:
  - Review Home: index.md
  - About the Review: about.md
  - Editorial Policy: editorial-policy.md
  - Contributing Authors: authors.md
  - Republished Articles:
      - C-Series Containers and the Founding Standard: articles/c-series-containers-founding-standard.md
      - Bells, Bread, and Field Hospitals: articles/bells-bread-and-field-hospitals.md
      - Children of Terra: articles/children-of-terra.md
      - Why Earth Union Is Still Called Earth Union: articles/why-earth-union-is-still-called-earth-union.md
      - The Compromise That Named the Chain: articles/the-compromise-that-named-the-chain.md
      - The Chain Was Not Softened: articles/the-chain-was-not-softened.md
      - The Human Trap in the Guardianship Settlement: articles/the-human-trap-in-guardianship-settlement.md
      - Faster-Than-Light Transit: articles/ftl-transit-operational-tradeoffs.md
      - The Ansible Is Not a Radio: articles/ansible-is-not-a-radio.md
